name: Verificar Duna Livre

on:
  push:
    branches: [duna-livre]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar dependências
        run: npm install --no-audit --no-fund

      - name: Construir Duna Livre
        run: npm run build
