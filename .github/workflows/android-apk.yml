name: Construir APK Duna Livre

on:
  push:
    branches: [android-duna-livre]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-duna-livre
  cancel-in-progress: true

jobs:
  apk:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Preparar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Instalar dependências web e nativas
        run: npm install --no-audit --no-fund

      - name: Construir jogo offline
        run: npm run build

      - name: Criar projeto Capacitor Android
        run: |
          npx cap add android
          npx cap sync android

      - name: Gerar ícone adaptativo e splash screen
        run: |
          npm install --no-save --no-audit --no-fund @capacitor/assets sharp
          node scripts/criar-assets-android.mjs
          npx capacitor-assets generate --android

      - name: Aplicar experiência nativa de jogo
        run: node scripts/ajustar-android.mjs

      - name: Compilar APK instalável
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Preparar arquivo para download
        run: |
          mkdir -p entrega
          cp android/app/build/outputs/apk/debug/app-debug.apk entrega/Duna-Livre-Android.apk
          sha256sum entrega/Duna-Livre-Android.apk > entrega/Duna-Livre-Android.sha256.txt

      - name: Enviar APK como artefato
        uses: actions/upload-artifact@v4
        with:
          name: Duna-Livre-Android-APK
          path: entrega/
          if-no-files-found: error
          retention-days: 14
