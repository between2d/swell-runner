name: Publicar jogos no GitHub Pages

on:
  push:
    branches: [main, duna-livre]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Baixar Maré Limpa JP
        uses: actions/checkout@v4
        with:
          ref: main
          path: mare

      - name: Baixar Duna Livre
        uses: actions/checkout@v4
        with:
          ref: duna-livre
          path: duna

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Construir Maré Limpa JP
        working-directory: mare
        run: |
          npm install --no-audit --no-fund
          npm run build

      - name: Construir Duna Livre
        working-directory: duna
        run: |
          npm install --no-audit --no-fund
          npm run build

      - name: Montar site com as duas versões
        run: |
          mkdir -p site/duna-livre
          cp -R mare/dist/. site/
          cp -R duna/dist/. site/duna-livre/

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Enviar site
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
